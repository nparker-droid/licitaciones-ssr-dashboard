<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Licitaciones SSR/APR — Hidrogestión</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2E75B6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Licitaciones HDG">
<style>
  :root{
    --blue-900:#1B3A57; --blue-700:#2E75B6; --blue-100:#DCE9F4;
    --gray-50:#F7F8FA; --gray-100:#EEF1F4; --gray-200:#DDE2E7; --gray-400:#8A94A0; --gray-700:#3B4452;
    --green:#1E8E5A; --green-bg:#E3F5EC;
    --orange:#B5650A; --orange-bg:#FCEEDD;
    --red:#C0392B; --red-bg:#FBE7E5;
    --white:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:Arial,Helvetica,sans-serif; background:var(--gray-50); color:var(--gray-700);
  }
  header.app-header{
    background:var(--blue-900); color:var(--white); padding:20px 28px;
  }
  header.app-header h1{ margin:0 0 4px; font-size:22px; }
  header.app-header .subtitle{ font-size:13px; color:#C9D8E8; }
  main{ max-width:1280px; margin:0 auto; padding:24px 28px 60px; }

  .kpi-grid{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:24px;
  }
  .kpi-card{
    background:var(--white); border:1px solid var(--gray-200); border-radius:8px; padding:14px 16px;
    box-shadow:0 1px 2px rgba(0,0,0,0.04);
  }
  .kpi-card .kpi-label{ font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--gray-400); margin-bottom:6px; }
  .kpi-card .kpi-value{ font-size:24px; font-weight:bold; color:var(--blue-900); }
  .kpi-card .kpi-value.alert{ color:var(--red); }
  .kpi-card .kpi-sub{ font-size:11px; color:var(--gray-400); margin-top:4px; }

  .urgent-card{
    background:var(--white); border:1px solid var(--gray-200); border-left:4px solid var(--red);
    border-radius:8px; padding:14px 18px; margin-bottom:24px; display:none;
  }
  .urgent-card h2{ margin:0 0 8px; font-size:14px; color:var(--red); }
  .urgent-row{ display:flex; gap:12px; align-items:flex-start; padding:8px 0; border-bottom:1px solid var(--gray-100); font-size:12.5px; }
  .urgent-row:last-child{ border-bottom:none; }
  .urgent-ms{ flex-shrink:0; min-width:86px; text-align:center; padding-top:1px; }
  .urgent-body a{ color:var(--blue-900); font-weight:bold; text-decoration:none; }
  .urgent-body a:hover{ text-decoration:underline; }

  .chart-card{
    background:var(--white); border:1px solid var(--gray-200); border-radius:8px; padding:18px 20px; margin-bottom:24px;
  }
  .chart-card h2{ margin:0 0 14px; font-size:14px; color:var(--blue-900); }
  .chart-row{ display:flex; align-items:center; gap:10px; margin-bottom:8px; font-size:12px; }
  .chart-row .chart-label{ width:190px; flex-shrink:0; color:var(--gray-700); }
  .chart-row .chart-bar-wrap{ flex:1; background:var(--gray-100); border-radius:4px; height:18px; overflow:hidden; }
  .chart-row .chart-bar{ height:100%; background:var(--blue-700); border-radius:4px; }
  .chart-row .chart-value{ width:120px; text-align:right; flex-shrink:0; font-weight:bold; color:var(--blue-900); }

  .search-bar{ margin-bottom:14px; }
  #global-search{
    width:100%; max-width:560px; padding:9px 12px; border:1px solid var(--gray-200); border-radius:8px;
    font-size:13px; font-family:inherit; background:var(--white);
  }
  #global-search:focus{ outline:none; border-color:var(--blue-700); box-shadow:0 0 0 2px rgba(46,117,182,0.15); }

  .tabs{ display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .tab-btn{
    background:var(--white); border:1px solid var(--gray-200); border-radius:20px; padding:7px 16px;
    font-size:12px; cursor:pointer; color:var(--gray-700);
  }
  .tab-btn.active{ background:var(--blue-700); color:var(--white); border-color:var(--blue-700); }
  .tab-btn .tab-count{ opacity:.7; }

  .category-block{ margin-bottom:28px; }
  .category-block.hidden{ display:none; }
  /* Pestaña Postulaciones HDG */
  tr.post-detail{ display:none; }
  tr.post-detail.open{ display:table-row; }
  .oferentes-toggle{ background:var(--blue-700,#2E75B6); color:#fff; border:none; padding:4px 9px; border-radius:5px; cursor:pointer; font-size:12px; white-space:nowrap; }
  .oferentes-toggle.open{ background:var(--blue-900,#1F3864); }
  .ofer-box{ padding:6px 4px; display:flex; flex-direction:column; gap:4px; }
  .ofer-row{ display:flex; align-items:center; gap:10px; padding:5px 9px; background:var(--gray-50,#f6f8fc); border-radius:5px; }
  .ofer-name{ flex:1; font-weight:600; }
  .ofer-monto{ font-variant-numeric:tabular-nums; color:var(--blue-900,#1F3864); font-weight:600; }
  .post-toolbar{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:10px; padding:10px 12px; background:var(--gray-50,#f6f8fc); border:1px solid var(--gray-200,#e2e8f0); border-radius:8px; }
  .drive-btn{ display:inline-block; background:#0F9D58; color:#fff; text-decoration:none; padding:8px 14px; border-radius:6px; font-weight:600; font-size:13px; }
  .drive-btn:hover{ background:#0b8043; }
  .post-nota{ font-size:12px; color:#5f6b7a; flex:1; min-width:220px; }
  .todas-seccion{ margin-bottom:22px; }
  .seccion-titulo{ font-size:14px; color:var(--blue-900,#1F3864); margin:0 0 8px; padding-bottom:4px; border-bottom:2px solid var(--blue-700,#2E75B6); }
  .category-header{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:10px; }
  .category-header h3{ margin:0; font-size:16px; color:var(--blue-900); }
  .category-count{ font-size:12px; color:var(--gray-400); }
  .category-empty{ background:var(--white); border:1px dashed var(--gray-200); border-radius:8px; padding:18px; text-align:center; color:var(--gray-400); font-size:12.5px; font-style:italic; }

  .table-wrap{ overflow-x:visible; }
  table.tenders{ width:100%; border-collapse:collapse; background:var(--white); border:1px solid var(--gray-200); border-radius:8px; overflow:hidden; font-size:12.5px; }
  table.tenders thead tr.header-row th{ background:var(--blue-900); color:var(--white); text-align:left; padding:9px 10px; font-weight:bold; white-space:nowrap; position:sticky; top:0; z-index:2; }
  table.tenders thead tr.filter-row td{ background:var(--gray-50); padding:6px 8px; border-bottom:2px solid var(--blue-700); }
  table.tenders td{ padding:9px 10px; border-bottom:1px solid var(--gray-100); vertical-align:top; }
  table.tenders tbody tr:hover td{ background:var(--gray-50); }
  table.tenders tbody tr:last-child td{ border-bottom:none; }

  th.sortable-th{ cursor:pointer; user-select:none; }
  th.sortable-th:hover{ background:var(--blue-700); }
  .sort-arrow{ display:inline-block; width:10px; font-size:10px; }

  .col-filter{
    width:100%; box-sizing:border-box; border:1px solid var(--gray-200); border-radius:4px;
    padding:4px 6px; font-size:11.5px; font-family:Arial,Helvetica,sans-serif;
  }
  .col-filter:focus{ outline:none; border-color:var(--blue-700); box-shadow:0 0 0 2px rgba(46,117,182,0.15); }

  .tender-name{ font-weight:bold; color:var(--blue-900); margin-bottom:2px; }
  .tender-meta{ color:var(--gray-400); font-size:11.5px; }
  .tender-id{ color:var(--gray-400); font-size:11px; margin-top:2px; }

  .badge{ display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:bold; }
  .badge-red{ background:var(--red-bg); color:var(--red); }
  .badge-orange{ background:var(--orange-bg); color:var(--orange); }
  .badge-green{ background:var(--green-bg); color:var(--green); }
  .badge-gray{ background:var(--gray-100); color:var(--gray-400); }
  .badge-blue{ background:var(--blue-100); color:var(--blue-700); }
  .badge-avoid{ background:var(--red-bg); color:var(--red); margin-top:3px; }

  .closing-cell .badge{ display:block; margin-top:4px; width:fit-content; }
  .hito-next{ font-size:11.5px; color:var(--gray-700); margin-top:5px; }
  .hito-next .badge{ display:inline-block; margin-top:2px; }
  .monto-na{ color:var(--gray-400); font-size:11px; font-style:italic; }

  .preguntas-cell .preguntas-row{ font-size:11.5px; margin-bottom:2px; color:var(--gray-700); }
  .preguntas-cell .badge{ display:block; margin-top:4px; width:fit-content; }
  .preguntas-na{ color:var(--gray-400); font-size:11px; font-style:italic; }

  tr.tr-avoid td{ background:#FCEEEC; }
  tr.tr-avoid td:first-child{ border-left:4px solid var(--red); }
  tr.tr-avoid:hover td{ background:#FAD9D5; }

  .empty-row td{ text-align:center; color:var(--gray-400); padding:20px; font-style:italic; }

  .mp-link{ color:var(--blue-700); font-weight:bold; text-decoration:none; font-size:11.5px; }
  .mp-link:hover{ text-decoration:underline; }

  footer.app-footer{ font-size:11px; color:var(--gray-400); padding:18px 28px; border-top:1px solid var(--gray-200); }
  footer.app-footer p{ margin:3px 0; }

  @media (max-width: 900px){
    main{ padding:16px 12px 40px; }
    header.app-header{ padding:14px 16px; }
    header.app-header h1{ font-size:17px; }
    .chart-row .chart-label{ width:120px; }
    .chart-row .chart-value{ width:96px; }
    .table-wrap{ overflow-x:auto; -webkit-overflow-scrolling:touch; }
    table.tenders{ min-width:920px; }
    table.tenders thead tr.header-row th{ position:static; }
  }
</style>
</head>
<body>

<header class="app-header">
  <h1>Dashboard de Licitaciones — SSR / APR (Ingeniería)</h1>
  <div class="subtitle" id="meta-line">Hidrogestión SpA · Monitoreo Mercado Público</div>
</header>

<main>
  <div class="urgent-card" id="urgentes"></div>

  <div class="search-bar">
    <input id="global-search" type="search" placeholder="🔎 Buscar en todas las etapas: nombre, entidad, ID, región, comuna, estado...">
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="categories"></div>
</main>

<footer class="app-footer" id="footer"></footer>

<script>
const TENDERS = __DATA__;

const ACTIVE_CATEGORIES = ["Diseños SSR/APR", "Estudios Hidrogeológicos", "Estudio Tarifario", "Diagnósticos Técnicos"];
const POST_CIERRE_CATEGORIES = ["Apertura Oferta Técnica", "Apertura Oferta Económica", "Resultados"];
// Pestaña transversal: licitaciones a las que HDG postuló (flag `aplicamos`),
// independiente de la etapa (categoria_display). Reemplaza en la barra a "Pasadas".
const POSTULACIONES = "Postulaciones HDG";
const CATEGORY_ORDER = [...ACTIVE_CATEGORIES, ...POST_CIERRE_CATEGORIES, POSTULACIONES, "Pasadas"];
const CATEGORY_ICON = {
  "Diseños SSR/APR": "📐",
  "Estudios Hidrogeológicos": "💧",
  "Estudio Tarifario": "📊",
  "Diagnósticos Técnicos": "🔍",
  "Apertura Oferta Técnica": "🗂️",
  "Apertura Oferta Económica": "💰",
  "Resultados": "🏁",
  "Postulaciones HDG": "📋",
  "Pasadas": "🗄️"
};

// Barra de pestañas. "Todas" se muestra en secciones por categoría; todas las vistas
// (salvo Postulaciones) muestran solo licitaciones vigentes (aún abiertas, no cerradas).
const TABS = ["Todas", "SSR", "Estudios Hidrogeológicos", POSTULACIONES];
const TAB_TITULO = {
  "Todas": "📂 Todas las licitaciones vigentes",
  "SSR": "🚰 SSR — licitaciones vigentes (aún se puede ofertar)",
  "Estudios Hidrogeológicos": "💧 Estudios Hidrogeológicos (vigentes)",
  "Postulaciones HDG": "📋 Postulaciones HDG"
};
const TODAS_SECCIONES = ACTIVE_CATEGORIES; // secciones por categoría dentro de "Todas"
function esVigente(t){ const d = daysRemaining(t.fcierre_iso); return d !== null && d >= 0; }
function tabItems(tab){
  if(tab === POSTULACIONES) return TENDERS.filter(t => t.aplicamos === true);
  if(tab === "SSR") return TENDERS.filter(esVigente);
  if(tab === "Estudios Hidrogeológicos") return TENDERS.filter(t => esVigente(t) && t.categoria === "Estudios Hidrogeológicos");
  if(tab.indexOf("Todas::") === 0){ const cat = tab.slice(7); return TENDERS.filter(t => esVigente(t) && t.categoria === cat); }
  return TENDERS.filter(esVigente); // "Todas"
}

const AVOID_REGIONS = ["biobio", "coquimbo"];

function normalize(s){
  return (s || "").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "");
}
function isAvoidRegion(region){
  const n = normalize(region);
  return AVOID_REGIONS.some(r => n.includes(r));
}

function fmtCLP(n){
  if(n === null || n === undefined) return "—";
  return "$" + n.toLocaleString("es-CL");
}

function isoFromDMY(s){
  const m = (s || "").match(/(\d{2})-(\d{2})-(\d{4})/);
  return m ? `${m[3]}-${m[2]}-${m[1]}` : "";
}

function daysRemaining(iso){
  if(!iso) return null;
  const now = new Date();
  const target = new Date(iso);
  return (target - now) / (1000 * 60 * 60 * 24);
}

function fmtDiasHoras(ms){
  const totalMin = Math.max(0, Math.floor(ms / 60000));
  const d = Math.floor(totalMin / 1440);
  const h = Math.floor((totalMin % 1440) / 60);
  return `${d}d ${h}h`;
}

function closingBadge(t){
  const d = daysRemaining(t.fcierre_iso);
  if(d === null) return "";
  if(d < 0) return `<span class="badge badge-gray">Cerrada</span>`;
  const ms = new Date(t.fcierre_iso) - new Date();
  if(d <= 2) return `<span class="badge badge-red">⏰ Cierra en ${fmtDiasHoras(ms)}</span>`;
  if(d <= 7) return `<span class="badge badge-orange">Cierra en ${fmtDiasHoras(ms)}</span>`;
  return `<span class="badge badge-green">Cierra en ${Math.ceil(d)} días</span>`;
}

// Próximo hito post-cierre según los datos de la ficha MP
// (apertura técnica → apertura económica → adjudicación).
function proximoHito(t){
  const now = new Date();
  const hitos = [
    ["Apertura técnica", t.fapertura_tecnica_iso, t.fapertura_tecnica_raw],
    ["Apertura económica", t.fapertura_economica_iso, t.fapertura_economica_raw],
    ["Adjudicación", t.fadjudicacion_iso, t.fadjudicacion_raw]
  ].filter(h => h[1]);
  for(const [lbl, iso, raw] of hitos){
    const d = new Date(iso);
    if(d >= now) return { lbl, raw, ms: d - now };
  }
  return null;
}

function hitoHtml(t){
  const h = proximoHito(t);
  if(h) return `<div class="hito-next">➡ ${h.lbl}: ${h.raw} <span class="badge badge-blue">en ${fmtDiasHoras(h.ms)}</span></div>`;
  if(t.fadjudicacion_raw) return `<div class="hito-next">🏁 Adjudicación: ${t.fadjudicacion_raw} (fecha cumplida)</div>`;
  return "";
}

function preguntasBadge(t){
  const now = new Date();
  if(!t.finicio_preguntas_iso) return `<span class="preguntas-na">No informado</span>`;
  const tIni = new Date(t.finicio_preguntas_iso);
  const tFin = t.ffinal_preguntas_iso ? new Date(t.ffinal_preguntas_iso) : null;
  const tResp = t.frespuestas_iso ? new Date(t.frespuestas_iso) : null;

  if(tIni > now){
    return `<span class="badge badge-gray">No iniciado (inicia en ${fmtDiasHoras(tIni - now)})</span>`;
  }
  if(tFin && tFin >= now){
    return `<span class="badge badge-orange">Preguntas: quedan ${fmtDiasHoras(tFin - now)}</span>`;
  }
  if(tResp && tResp >= now){
    return `<span class="badge badge-blue">Respuestas en ${Math.ceil(daysRemaining(t.frespuestas_iso))} día(s)</span>`;
  }
  if(tResp && tResp < now){
    return `<span class="badge badge-green">Respuestas disponibles</span>`;
  }
  return `<span class="badge badge-gray">Esperando respuestas (sin fecha informada)</span>`;
}

// Determina si la licitación exige visita a terreno y de qué tipo.
// Prioriza un campo estructurado `visita_terreno` (si el monitoreo lo entrega);
// en su defecto, parsea el texto de `observaciones`.
function visitaTerrenoInfo(t){
  const tieneEstructurado = !!t.visita_terreno;
  const fuente = normalize(t.visita_terreno || t.observaciones || "");
  // Valores estructurados que significan "sin dato"
  if(tieneEstructurado && /no informad|no aplica|no indica|sin informaci|s\/i|n\/a/.test(fuente)){
    return { tipo: null, realizada: false };
  }
  if(!tieneEstructurado && !fuente.includes("visita a terreno") && !fuente.includes("visita terreno")){
    return { tipo: null, realizada: false };
  }
  const realizada = /realiz/.test(fuente);
  if(/no\s+(exige|requiere|contempla|hay)/.test(fuente) || /sin visita/.test(fuente)){
    return { tipo: "No exige", realizada: false };
  }
  if(fuente.includes("oblig")) return { tipo: "Obligatoria", realizada };
  if(fuente.includes("opcion") || fuente.includes("volunt")) return { tipo: "Opcional", realizada };
  return { tipo: "Exige", realizada };
}

function visitaBadge(t){
  const info = visitaTerrenoInfo(t);
  if(!info.tipo) return `<span class="preguntas-na">No indica</span>`;
  const clsMap = { "Obligatoria":"badge-red", "Opcional":"badge-blue", "Exige":"badge-orange", "No exige":"badge-gray" };
  const cls = clsMap[info.tipo] || "badge-gray";
  let html = `<span class="badge ${cls}">${info.tipo === "Exige" ? "Exige visita" : info.tipo}</span>`;
  const fechaRaw = t.visita_terreno_fecha;
  if(fechaRaw){
    const iso = isoFromDMY(fechaRaw);
    const pasada = iso && new Date(iso) < new Date(new Date().toDateString());
    html += `<div class="tender-meta" style="margin-top:3px;">📍 ${fechaRaw}${pasada ? " · ya realizada" : ""}</div>`;
  } else if(info.realizada){
    html += `<div class="tender-meta" style="margin-top:3px;">ya realizada</div>`;
  }
  return html;
}

function estadoBadge(estado){
  const e = estado || "";
  if(/urgente/i.test(e)) return `<span class="badge badge-red">${e}</span>`;
  if(/no participar|exclusi/i.test(e)) return `<span class="badge badge-gray">${e}</span>`;
  if(/alta relevancia/i.test(e)) return `<span class="badge badge-blue">${e}</span>`;
  return `<span class="badge badge-orange">${e}</span>`;
}

const COLUMNS = [
  {
    key: "ngrupo", label: "N°", sortable: false, filterable: false,
    render: t => `<strong>${t.n_grupo}</strong>`
  },
  {
    key: "tender", label: "Licitación", sortable: true, filterable: true,
    sortVal: t => (t.nombre || "").toLowerCase(),
    filterVal: t => `${t.nombre} ${t.entidad} ${t.id}`.toLowerCase(),
    render: t => `<div class="tender-name">${t.nombre}</div><div class="tender-meta">${t.entidad}</div><div class="tender-id">${t.id}${t.fdeteccion ? " · Detectada: " + t.fdeteccion : ""}</div>`
  },
  {
    key: "region", label: "Región / Comuna", sortable: true, filterable: true,
    sortVal: t => (t.region || "").toLowerCase(),
    filterVal: t => `${t.region} ${t.comuna}`.toLowerCase(),
    render: t => `${t.region}<br><span class="tender-meta">${t.comuna}</span>` + (isAvoidRegion(t.region) ? `<br><span class="badge badge-avoid" title="Región fuera de foco prioritario de Hidrogestión">⚠ Evitar</span>` : "")
  },
  {
    key: "fpub", label: "Publicación", sortable: true, filterable: true,
    sortVal: t => isoFromDMY(t.fpub),
    filterVal: t => (t.fpub || "").toLowerCase(),
    render: t => t.fpub
  },
  {
    key: "fcierre", label: "Cierre / Próximo hito", sortable: true, filterable: true,
    sortVal: t => t.fcierre_iso || "",
    filterVal: t => (t.fcierre_raw || "").toLowerCase(),
    render: t => {
      const postCierre = POST_CIERRE_CATEGORIES.includes(t.categoria_display) || t.categoria_display === "Pasadas";
      if(postCierre){
        return `<div class="closing-cell">${t.fcierre_raw}<span class="badge badge-gray">Cerrada</span>${hitoHtml(t)}</div>`;
      }
      return `<div class="closing-cell">${t.fcierre_raw}${closingBadge(t)}</div>`;
    }
  },
  {
    key: "preguntas", label: "Preguntas / Resp.", sortable: true, filterable: false,
    sortVal: t => t.ffinal_preguntas_iso || "",
    render: t => {
      if(!t.finicio_preguntas_raw) return `<span class="preguntas-na">No informado</span>`;
      return `<div class="preguntas-cell">
        <div class="preguntas-row">🗓 Ini: ${t.finicio_preguntas_raw}</div>
        <div class="preguntas-row">⏱ Fin: ${t.ffinal_preguntas_raw}</div>
        <div class="preguntas-row">📢 Resp: ${t.frespuestas_raw || "—"}</div>
        ${preguntasBadge(t)}
      </div>`;
    }
  },
  {
    key: "visita", label: "Visita a terreno", sortable: true, filterable: false,
    sortVal: t => { const i = visitaTerrenoInfo(t); return i.tipo === "Obligatoria" ? "1" : (i.tipo ? "2" : "3"); },
    render: t => visitaBadge(t)
  },
  {
    key: "monto", label: "Monto estimado", sortable: true, filterable: true,
    sortVal: t => (t.monto_num === null || t.monto_num === undefined) ? -1 : t.monto_num,
    filterVal: t => (t.monto_num ? fmtCLP(t.monto_num) : (t.monto_raw || "")).toLowerCase(),
    render: t => t.monto_num ? `<strong>${fmtCLP(t.monto_num)}</strong>` : `<span class="monto-na">${t.monto_raw}</span>`
  },
  {
    key: "estado", label: "Estado", sortable: true, filterable: true,
    sortVal: t => (t.estado || "").toLowerCase(),
    filterVal: t => `${t.estado || ""} ${t.estado_mp || ""}`.toLowerCase(),
    render: t => estadoBadge(t.estado) + (t.estado_mp ? `<div class="tender-meta" style="margin-top:3px;">MP: ${t.estado_mp}</div>` : "")
  },
  {
    key: "link", label: "", sortable: false, filterable: false,
    render: t => `<a class="mp-link" href="${t.link}" target="_blank" rel="noopener">Ver ficha →</a>`
  }
];

// ── Pestaña "Postulaciones HDG" ────────────────────────────────────────────
// Vista transversal de licitaciones con aplicamos===true. Columnas fijas:
// apertura técnica/económica/adjudicación + resultado + oferentes (nombre y monto).
function resultadoBadge(r){
  const m = { "Adjudicada":"badge-green", "No adjudicada":"badge-gray", "Desierta":"badge-gray", "Pendiente":"badge-orange" };
  return `<span class="badge ${m[r] || "badge-orange"}">${r || "Pendiente"}</span>`;
}
function fmtHitoCell(raw, iso){
  if(!raw) return `<span class="preguntas-na">—</span>`;
  const past = iso && new Date(iso) <= new Date();
  return `${raw}${past ? ` <span class="badge badge-gray">✓</span>` : ""}`;
}
function oferentesResumen(t){
  const of = Array.isArray(t.oferentes) ? t.oferentes : [];
  if(of.length) return `<button class="oferentes-toggle" data-id="${t.id}">▸ ${of.length} oferente${of.length > 1 ? "s" : ""}</button>`;
  const aperturaPasada = t.fapertura_tecnica_iso && new Date(t.fapertura_tecnica_iso) <= new Date();
  return aperturaPasada
    ? `<span class="badge badge-gray">Sin datos aún</span>`
    : `<span class="preguntas-na">Pendiente apertura</span>`;
}
function oferentesDetalleHtml(t){
  const of = Array.isArray(t.oferentes) ? t.oferentes : [];
  if(!of.length) return "";
  const rows = of.map(o => {
    const rechazada = o.estado === "Rechazada";
    const montoTxt = (o.monto === null || o.monto === undefined || o.monto === "") ? (rechazada ? "" : "—") : fmtCLP(o.monto);
    const estBadge = rechazada ? ` <span class="badge badge-gray">Rechazada</span>` : "";
    const adj = o.adjudicado ? ` <span class="badge badge-green">✔ Adjudicado</span>` : "";
    return `<div class="ofer-row"><span class="ofer-name">${o.nombre}</span><span class="ofer-monto">${montoTxt}</span>${estBadge}${adj}</div>`;
  }).join("");
  return `<div class="ofer-box">${rows}</div>`;
}
function postulacionesItems(){
  return TENDERS.filter(t => t.aplicamos === true && matchesGlobal(t))
                .slice().sort((a, b) => (a.fcierre_iso || "9999").localeCompare(b.fcierre_iso || "9999"));
}
function buildPostulacionesTable(){
  const heads = ["Licitación", "Cierre", "Apertura técnica", "Apertura económica", "Adjudicación", "Resultado", "Oferentes"];
  const barra = `<div class="post-toolbar">
    <a class="drive-btn" href="https://docs.google.com/spreadsheets/d/1DRcHeateStv9Hzh4VlZQYTspMp9feKTZKCJTDzhv9o8/edit" target="_blank" rel="noopener">✏️ Editar postulaciones (planilla en Drive)</a>
    <span class="post-nota">Marca la casilla «aplicamos» en la planilla Registro HDG. Los cambios se reflejan en la actualización diaria del dashboard (barrido ~14:00 h, hora de Chile; puede tardar hasta ~24 h).</span>
  </div>`;
  return barra + `<div class="table-wrap"><table class="tenders" data-cat="${POSTULACIONES}">
    <thead><tr class="header-row">${heads.map(h => `<th>${h}</th>`).join("")}</tr></thead>
    <tbody id="tbody-${catId(POSTULACIONES)}"></tbody>
  </table></div>`;
}
function renderPostulacionesTbody(){
  const tb = document.getElementById(`tbody-${catId(POSTULACIONES)}`);
  if(!tb) return;
  const items = postulacionesItems();
  if(!items.length){
    tb.innerHTML = `<tr class="empty-row"><td colspan="7">Aún no hay licitaciones marcadas como postuladas. Marca la casilla "aplicamos" en la planilla Registro HDG.</td></tr>`;
  } else {
    tb.innerHTML = items.map(t => {
      const main = `<tr class="${isAvoidRegion(t.region) ? "tr-avoid" : ""}">
        <td><div class="tender-name">${t.nombre}</div><div class="tender-meta">${t.entidad} · ${t.region}</div><div class="tender-id">${t.id}</div><a class="mp-link" href="${t.link}" target="_blank" rel="noopener">Ver ficha →</a></td>
        <td>${t.fcierre_raw || "—"}</td>
        <td>${fmtHitoCell(t.fapertura_tecnica_raw, t.fapertura_tecnica_iso)}</td>
        <td>${fmtHitoCell(t.fapertura_economica_raw, t.fapertura_economica_iso)}</td>
        <td>${fmtHitoCell(t.fadjudicacion_raw, t.fadjudicacion_iso)}</td>
        <td>${resultadoBadge(t.resultado_hdg)}</td>
        <td>${oferentesResumen(t)}</td></tr>`;
      const det = `<tr class="post-detail" data-detail="${t.id}"><td colspan="7">${oferentesDetalleHtml(t)}</td></tr>`;
      return main + det;
    }).join("");
  }
  const countEl = document.getElementById(`count-${catId(POSTULACIONES)}`);
  if(countEl) countEl.textContent = `${items.length} postulaci${items.length === 1 ? "ón" : "ones"}`;
}

const tableState = {};
let globalSearch = "";
let activeTab = "Todas";

function catId(cat){ return cat.replace(/[^a-zA-Z0-9]/g, ""); }

// ── Persistencia liviana de búsqueda y pestaña activa ──────────────────────
function saveUiState(){
  try{ localStorage.setItem("hdg_dash_ui", JSON.stringify({ q: globalSearch, tab: activeTab })); }catch(e){}
}
function loadUiState(){
  try{ return JSON.parse(localStorage.getItem("hdg_dash_ui")) || {}; }catch(e){ return {}; }
}

function matchesGlobal(t){
  if(!globalSearch) return true;
  const hay = normalize(`${t.nombre} ${t.entidad} ${t.id} ${t.region} ${t.comuna} ${t.estado} ${t.estado_mp || ""}`);
  return hay.includes(normalize(globalSearch));
}

function renderKPIs(){
  const active = TENDERS.filter(t => t.categoria_display !== "Pasadas");
  const total = active.length;
  const montos = active.filter(t => t.monto_num);
  const montoTotal = montos.reduce((s, t) => s + t.monto_num, 0);
  const closing7 = active.filter(t => { const d = daysRemaining(t.fcierre_iso); return d !== null && d >= 0 && d <= 7; }).length;
  const closing48 = active.filter(t => { const d = daysRemaining(t.fcierre_iso); return d !== null && d >= 0 && d <= 2; }).length;
  const avoidCount = active.filter(t => isAvoidRegion(t.region)).length;
  const now = new Date();
  const pregAbiertas = active.filter(t => t.finicio_preguntas_iso && t.ffinal_preguntas_iso && new Date(t.finicio_preguntas_iso) <= now && new Date(t.ffinal_preguntas_iso) >= now).length;

  const cards = [
    { label: "Licitaciones activas", value: total, sub: `${montos.length} con monto informado` },
    { label: "Monto total estimado", value: fmtCLP(montoTotal), sub: `Suma de ${montos.length} de ${total} licitaciones` },
    { label: "Cierran en ≤ 7 días", value: closing7, sub: "Requieren acción esta semana", alert: closing7 > 0 },
    { label: "Cierran en ≤ 48 h", value: closing48, sub: "Urgente — verificar factibilidad", alert: closing48 > 0 },
    { label: "Preguntas abiertas", value: pregAbiertas, sub: "Período de preguntas vigente", alert: pregAbiertas > 0 },
    { label: "En regiones a evitar", value: avoidCount, sub: "Biobío / Coquimbo — fuera de foco prioritario", alert: avoidCount > 0 }
  ];

  document.getElementById("kpi-grid").innerHTML = cards.map(c => `
    <div class="kpi-card">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value${c.alert ? " alert" : ""}">${c.value}</div>
      <div class="kpi-sub">${c.sub}</div>
    </div>`).join("");
}

// Panel de próximos cierres (≤7 días), transversal a las pestañas.
function renderUrgentes(){
  const el = document.getElementById("urgentes");
  const urg = TENDERS
    .filter(t => ACTIVE_CATEGORIES.includes(t.categoria_display))
    .map(t => ({ t, d: daysRemaining(t.fcierre_iso) }))
    .filter(x => x.d !== null && x.d >= 0 && x.d <= 7)
    .sort((a, b) => a.d - b.d);
  if(!urg.length){ el.style.display = "none"; el.innerHTML = ""; return; }
  el.style.display = "block";
  el.innerHTML = `<h2>⏰ Próximos cierres (≤ 7 días) — todas las categorías</h2>` + urg.map(({t, d}) => {
    const ms = new Date(t.fcierre_iso) - new Date();
    const badgeCls = d <= 2 ? "badge-red" : "badge-orange";
    return `<div class="urgent-row">
      <div class="urgent-ms"><span class="badge ${badgeCls}">${fmtDiasHoras(ms)}</span></div>
      <div class="urgent-body">
        <a href="${t.link}" target="_blank" rel="noopener">${t.nombre}</a>
        <div class="tender-meta">${t.entidad} · ${t.region}${isAvoidRegion(t.region) ? " ⚠" : ""} · Cierre: ${t.fcierre_raw} · ${t.monto_num ? fmtCLP(t.monto_num) : "monto no informado"}</div>
      </div>
    </div>`;
  }).join("");
}

function renderChart(){
  // Agrupa por categoría sustantiva (t.categoria), no por etapa del proceso,
  // para que las licitaciones post-cierre sigan sumando a su categoría.
  const byCat = {};
  ACTIVE_CATEGORIES.forEach(c => byCat[c] = 0);
  TENDERS.forEach(t => {
    if(t.monto_num && t.categoria_display !== "Pasadas"){
      const c = t.categoria || t.categoria_display;
      byCat[c] = (byCat[c] || 0) + t.monto_num;
    }
  });
  const cats = ACTIVE_CATEGORIES.concat(Object.keys(byCat).filter(c => !ACTIVE_CATEGORIES.includes(c)));
  const max = Math.max(1, ...Object.values(byCat));
  document.getElementById("chart").innerHTML = cats.map(cat => {
    const v = byCat[cat] || 0;
    const pct = Math.round((v / max) * 100);
    return `<div class="chart-row">
      <div class="chart-label">${CATEGORY_ICON[cat] || "📁"} ${cat}</div>
      <div class="chart-bar-wrap"><div class="chart-bar" style="width:${pct}%"></div></div>
      <div class="chart-value">${fmtCLP(v)}</div>
    </div>`;
  }).join("");
}

function setActiveTab(tab){
  activeTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  document.querySelectorAll(".category-block").forEach(block => {
    block.classList.toggle("hidden", block.dataset.cat !== tab);
  });
  saveUiState();
}

function tabCount(t){ return tabItems(t).length; }
function renderTabs(){
  document.getElementById("tabs").innerHTML = TABS.map(t => {
    const count = tabCount(t);
    const label = TAB_TITULO[t] || t;
    return `<button class="tab-btn" data-tab="${t}">${label} <span class="tab-count">(${count})</span></button>`;
  }).join("");
  document.getElementById("tabs").addEventListener("click", e => {
    const btn = e.target.closest(".tab-btn");
    if(!btn) return;
    setActiveTab(btn.dataset.tab);
  });
}

function getFilteredSorted(cat){
  const st = tableState[cat];
  let items = tabItems(cat).filter(t => matchesGlobal(t));
  COLUMNS.forEach(col => {
    if(col.filterable && st.filters[col.key]){
      const needle = st.filters[col.key].toLowerCase();
      items = items.filter(t => col.filterVal(t).includes(needle));
    }
  });
  if(st.sortKey){
    const col = COLUMNS.find(c => c.key === st.sortKey);
    items = items.slice().sort((a, b) => {
      const av = col.sortVal(a), bv = col.sortVal(b);
      if(av < bv) return -1 * st.sortDir;
      if(av > bv) return 1 * st.sortDir;
      return 0;
    });
  } else {
    items = items.slice().sort((a, b) => (a.fcierre_iso || "9999").localeCompare(b.fcierre_iso || "9999"));
  }
  return items;
}

function rowsHtml(items){
  return items.map(t => `<tr class="${isAvoidRegion(t.region) ? "tr-avoid" : ""}">${COLUMNS.map(col => `<td>${col.render(t)}</td>`).join("")}</tr>`).join("");
}

function renderTbody(cat){
  if(cat === POSTULACIONES){ renderPostulacionesTbody(); return; }
  if(cat === "Todas"){ TODAS_SECCIONES.forEach(scat => { const k = "Todas::" + scat; if(tableState[k]) renderTbodyTable(k); }); return; }
  renderTbodyTable(cat);
}
function renderTbodyTable(cat){
  const id = catId(cat);
  const tbody = document.getElementById(`tbody-${id}`);
  if(!tbody) return;
  const items = getFilteredSorted(cat);
  const totalForCat = tabItems(cat).length;
  tbody.innerHTML = items.length ? rowsHtml(items) : `<tr class="empty-row"><td colspan="${COLUMNS.length}">Sin resultados para el filtro aplicado.</td></tr>`;
  const countEl = document.getElementById(`count-${id}`);
  if(countEl) countEl.textContent = `${items.length} de ${totalForCat}`;
}

function updateSortIndicators(cat){
  const id = catId(cat);
  const st = tableState[cat];
  COLUMNS.forEach(col => {
    if(!col.sortable) return;
    const th = document.getElementById(`th-${id}-${col.key}`);
    if(!th) return;
    const arrow = th.querySelector(".sort-arrow");
    if(!arrow) return;
    arrow.textContent = st.sortKey === col.key ? (st.sortDir === 1 ? "▲" : "▼") : "";
  });
}

function buildCategoryTable(cat){
  const id = catId(cat);
  const headCells = COLUMNS.map(col => {
    if(!col.sortable) return `<th>${col.label}</th>`;
    return `<th id="th-${id}-${col.key}" class="sortable-th" data-cat="${cat}" data-key="${col.key}">${col.label} <span class="sort-arrow"></span></th>`;
  }).join("");
  const filterCells = COLUMNS.map(col => {
    if(!col.filterable) return `<td></td>`;
    return `<td><input type="text" class="col-filter" data-cat="${cat}" data-key="${col.key}" placeholder="Filtrar..."></td>`;
  }).join("");
  return `<div class="table-wrap"><table class="tenders" data-cat="${cat}">
    <thead>
      <tr class="header-row">${headCells}</tr>
      <tr class="filter-row">${filterCells}</tr>
    </thead>
    <tbody id="tbody-${id}"></tbody>
  </table></div>`;
}

function renderCategories(){
  // Se renderizan TODAS las etapas (incluso vacías) para que cada pestaña
  // muestre siempre contenido coherente al seleccionarla.
  const blocksHtml = TABS.map(cat => {
    const isPost = cat === POSTULACIONES;
    const id = catId(cat);
    let inner, countTxt;
    if(isPost){
      const items = tabItems(cat);
      inner = buildPostulacionesTable();
      countTxt = `${items.length} postulaci${items.length === 1 ? "ón" : "ones"}`;
    } else if(cat === "Todas"){
      const secciones = TODAS_SECCIONES.map(scat => {
        const k = "Todas::" + scat;
        const n = tabItems(k).length;
        if(!n) return "";
        return `<div class="todas-seccion"><h4 class="seccion-titulo">${CATEGORY_ICON[scat] || "📁"} ${scat} <span class="tab-count">(${n})</span></h4>${buildCategoryTable(k)}</div>`;
      }).filter(Boolean).join("");
      const total = tabItems("Todas").length;
      inner = secciones || `<div class="category-empty">Sin licitaciones vigentes.</div>`;
      countTxt = `${total} vigente${total === 1 ? "" : "s"}`;
    } else {
      const items = tabItems(cat);
      inner = items.length ? buildCategoryTable(cat) : `<div class="category-empty">Sin licitaciones para esta vista.</div>`;
      countTxt = `${items.length} licitaci${items.length === 1 ? "ón" : "ones"}`;
    }
    return `<div class="category-block" data-cat="${cat}">
      <div class="category-header">
        <h3>${TAB_TITULO[cat] || cat}</h3>
        <span class="category-count" id="count-${id}">${countTxt}</span>
      </div>
      ${inner}
    </div>`;
  }).join("");
  const container = document.getElementById("categories");
  container.innerHTML = blocksHtml;

  const allKeys = TABS.flatMap(cat => cat === "Todas" ? TODAS_SECCIONES.map(s => "Todas::" + s) : [cat]);
  allKeys.forEach(k => { tableState[k] = { sortKey: null, sortDir: 1, filters: {} }; });
  TABS.forEach(cat => renderTbody(cat));

  container.addEventListener("click", e => {
    const tog = e.target.closest(".oferentes-toggle");
    if(tog){
      const det = document.querySelector(`tr.post-detail[data-detail="${tog.dataset.id}"]`);
      if(det){
        const open = det.classList.toggle("open");
        tog.classList.toggle("open", open);
        tog.textContent = (open ? "▾ " : "▸ ") + tog.textContent.replace(/^[▸▾]\s*/, "");
      }
      return;
    }
    const th = e.target.closest(".sortable-th");
    if(!th) return;
    const cat = th.dataset.cat, key = th.dataset.key;
    const st = tableState[cat];
    if(st.sortKey === key){ st.sortDir *= -1; } else { st.sortKey = key; st.sortDir = 1; }
    renderTbody(cat);
    updateSortIndicators(cat);
  });

  container.addEventListener("input", e => {
    if(!e.target.classList.contains("col-filter")) return;
    const cat = e.target.dataset.cat, key = e.target.dataset.key;
    tableState[cat].filters[key] = e.target.value;
    renderTbody(cat);
  });
}

function initGlobalSearch(){
  const input = document.getElementById("global-search");
  input.addEventListener("input", () => {
    globalSearch = input.value.trim();
    TABS.forEach(cat => renderTbody(cat));
    saveUiState();
  });
  return input;
}

const FECHA_BARRIDO = "__FECHA_BARRIDO__";

function renderMeta(){
  const ultima = (FECHA_BARRIDO && FECHA_BARRIDO.indexOf("FECHA_BARRIDO") === -1) ? FECHA_BARRIDO : "—";
  document.getElementById("meta-line").textContent = `Hidrogestión SpA · Monitoreo Mercado Público · Último barrido de MP: ${ultima} · ${TENDERS.length} licitaciones en seguimiento · Countdowns recalculados cada 60 s (los datos se actualizan con cada barrido)`;
  document.getElementById("footer").innerHTML = `
    <p>Generado automáticamente por el monitoreo diario de licitaciones de ingeniería SSR/APR en Mercado Público. No incluye licitaciones de construcción de obra ni de Asesoría a la Inspección Fiscal (AIF).</p>
    <p>Una vez vencida la "Fecha de cierre" (plazo límite para presentar la oferta, columna que no se modifica en etapas posteriores), la licitación avanza por los estados "Apertura Oferta Técnica", "Apertura Oferta Económica" y "Resultados" conforme se registran los hitos de la ficha en Mercado Público. Transcurridos 5 días corridos desde la fecha de adjudicación, la licitación se traslada de forma definitiva a la pestaña "Pasadas", donde permanece visible de manera indefinida para trazabilidad (no se retira nunca de este dashboard ni de la planilla maestra).</p>
    <p>Las filas resaltadas en rojo corresponden a licitaciones en regiones fuera del foco prioritario de Hidrogestión (Biobío, Coquimbo) — se mantienen en el listado por trazabilidad, no se excluyen automáticamente.</p>
    <p>El nivel de interés/prioridad de cada licitación es un criterio del equipo y no se incluye en este dashboard.</p>
  `;
}

renderUrgentes();
renderTabs();
renderCategories();
renderMeta();

// Restaurar estado de UI (búsqueda y pestaña) de la sesión anterior.
(function restoreUi(){
  const st = loadUiState();
  const input = initGlobalSearch();
  if(st.q){ input.value = st.q; globalSearch = st.q; TABS.forEach(cat => renderTbody(cat)); }
  setActiveTab(st.tab && TABS.includes(st.tab) ? st.tab : "Todas");
})();

// Actualiza contadores de días/horas (cierre, preguntas, hitos) cada 60 s sin recargar
// la página. Solo refresca KPIs, panel de urgentes y cuerpos de tabla (no cabeceras),
// preservando orden/filtros aplicados y sin duplicar listeners.
setInterval(() => {
  renderUrgentes();
  TABS.forEach(cat => renderTbody(cat));
}, 60000);
</script>
